    <style>
        :root {
            --bg: #000000;
            --surface: #0a0a0a;
            --accent: #ff3e00;
            --text: #ffffff;
            --text-dim: #888888;
            --border: #1a1a1a;
            --border-hover: #333333;
        }
        body { 
            font-family: 'Outfit', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 40px 20px; 
            overflow-x: hidden;
        }
        .container { max-width: 1100px; margin: 0 auto; }
        
        header { text-align: center; margin-bottom: 50px; }
        h1 { 
            font-weight: 600; 
            font-size: 2.5rem; 
            letter-spacing: -1px; 
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff 0%, #888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle { color: var(--text-dim); font-size: 15px; font-weight: 300; }
        
        .search-container {
            position: sticky;
            top: 20px;
            z-index: 100;
            margin-bottom: 40px;
        }
        .search-box { 
            width: 100%; 
            padding: 20px 24px; 
            font-size: 18px; 
            border-radius: 16px; 
            border: 1px solid var(--border); 
            background: rgba(10, 10, 10, 0.8); 
            backdrop-filter: blur(12px);
            color: #fff; 
            box-sizing: border-box; 
            outline: none; 
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            font-family: inherit;
        }
        .search-box:focus { 
            border-color: var(--accent); 
            background: #000;
            box-shadow: 0 0 30px rgba(255, 62, 0, 0.15);
        }
        
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); 
            gap: 20px; 
        }
        .card { 
            background: var(--surface); 
            padding: 24px; 
            border-radius: 16px; 
            border: 1px solid var(--border); 
            cursor: pointer; 
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); 
            text-align: left;
            position: relative;
            overflow: hidden;
        }
        .card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(255,62,0,0.1), transparent);
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .card:hover { 
            border-color: var(--border-hover); 
            background: #0e0e0e; 
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .card:hover::after { opacity: 1; }
        
        .card h3 { 
            margin: 0 0 10px 0; 
            font-size: 18px; 
            font-weight: 600;
            color: #efefef;
            transition: color 0.3s ease;
        }
        .card:hover h3 { color: var(--accent); }
        .card p { 
            margin: 0; 
            font-size: 12px; 
            color: var(--text-dim); 
            text-transform: uppercase; 
            letter-spacing: 1.5px;
            font-weight: 400;
        }
        
        #status { 
            margin-bottom: 25px; 
            padding: 20px; 
            text-align: center; 
            font-weight: 400; 
            color: var(--accent); 
            background: rgba(255, 62, 0, 0.05); 
            border: 1px solid rgba(255, 62, 0, 0.1);
            border-radius: 16px; 
            display: none;
            animation: fadeIn 0.4s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #333; }
    </style>
</head>

        const channels = db.channels || [];
        const grid = document.getElementById('grid');
        const searchInput = document.getElementById('searchInput');
        const statusEl = document.getElementById('status');

        function renderChannels(list) {
            grid.innerHTML = '';
            list.forEach(channel => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <h3>${channel.name}</h3>
                    <p>${channel.category || 'Live TV'}</p>
                `;
                card.onclick = () => generateM3U(channel.name, channel.source);
                grid.appendChild(card);
            });
        }

        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = channels.filter(c => c.name.toLowerCase().includes(term) || (c.category && c.category.toLowerCase().includes(term)));
            renderChannels(filtered);
        });

        function generateM3U(name, source) {
            statusEl.style.display = 'block';
            statusEl.style.color = 'var(--accent)';
            statusEl.style.background = 'rgba(255, 62, 0, 0.05)';
            statusEl.style.borderColor = 'rgba(255, 62, 0, 0.1)';
            
            statusEl.innerText = "Extracting stream: " + name + "...";
            
            fetch('http://127.0.0.1:53626/api/start', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: source })
            })
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    statusEl.innerText = "Error: " + data.error;
                    statusEl.style.color = '#ff4444';
                    statusEl.style.background = 'rgba(255, 68, 68, 0.05)';
                    statusEl.style.borderColor = 'rgba(255, 68, 68, 0.1)';
                } else {
                    statusEl.innerText = "Stream captured! Syncing with VLC...";
                    statusEl.style.color = '#00ff88';
                    statusEl.style.background = 'rgba(0, 255, 136, 0.05)';
                    statusEl.style.borderColor = 'rgba(0, 255, 136, 0.1)';
                    setTimeout(() => {
                        statusEl.style.display = 'none';
                    }, 5000);
                }
            })
            .catch(err => {
                statusEl.innerText = "Error contacting bridge. Please ensure start.sh is active.";
                statusEl.style.color = '#ff4444';
                statusEl.style.background = 'rgba(255, 68, 68, 0.05)';
                statusEl.style.borderColor = 'rgba(255, 68, 68, 0.1)';
            });
        }

        // Render all channels on page load
        renderChannels(channels);
